spring:
  datasource:
    url: ${DB_URL}
    driver-class-name: ${DB_DRIVER}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

### dev override: 운영 유사 모니터링 검증을 위해 Prometheus endpoint를 노출 ###
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

springdoc:
  use-fqn: true
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# dev override: 개발 서버에서는 외부 API provider와 자동 스케줄링을 활성화합니다.
exchange:
  rate:
    provider: ${EXCHANGE_RATE_PROVIDER:api} # stub | api
    scheduler:
      enabled: true
  rate-api:
    base-url: ${EXCHANGE_RATE_API_URL:https://v6.exchangerate-api.com}
    api-key: ${EXCHANGE_RATE_API_KEY:}