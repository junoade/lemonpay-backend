spring:
  application:
    name: lemonpay

### Do not expose env/configprops/heapdump on public networks. ###
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    enabled: false

### Exchange rate defaults ###
exchange:
  rate:
    sync-ttl-minutes: 60
    scheduler:
      cron: "0 */10 * * * *"
      pairs:
        - USD/KRW
        - JPY/KRW
  rate-api:
    base-url: ${EXCHANGE_RATE_API_URL}
    api-key: ${EXCHANGE_RATE_API_KEY}
