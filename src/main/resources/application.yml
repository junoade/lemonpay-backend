spring:
  application:
    name: lemonpay

### Do not expose env/configprops/heapdump/circuitbreakers on public networks. ###
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true

resilience4j:
  circuitbreaker:
    instances:
      exchangeRateApi:
        sliding-window-type: count_based
        sliding-window-size: 5
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
        recordExceptions:
          - com.lemonpay.exchange.application.ExchangeRateProviderException
        ignore-exceptions:
          - com.lemonpay.common.exception.CoreException

springdoc:
  api-docs:
    enabled: false

### Exchange rate defaults ###
exchange:
  rate:
    sync-ttl-minutes: 60
    scheduler:
      cron: "0 */10 * * * *"
      pairs:
        - USD/KRW
        - JPY/KRW
  rate-api:
    base-url: ${EXCHANGE_RATE_API_URL}
    api-key: ${EXCHANGE_RATE_API_KEY}
